<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="katex.min.css">
  <script src="katex.min.js"></script>
  <script src="mermaid.min.js"></script>
</head>
<body>
  <div id="container"></div>
  <script>
    window.__flutterSvgResults = {};
    mermaid.initialize({ startOnLoad: false, securityLevel: "strict" });
    window.renderSvg = async (type, code) => {
      const container = document.getElementById("container");
      container.innerHTML = "";
      if (type === "latex-inline") {
        katex.render(code, container, { displayMode: false, throwOnError: false });
        return container.innerHTML;
      }
      if (type === "latex-block") {
        katex.render(code, container, { displayMode: true, throwOnError: false });
        return container.innerHTML;
      }
      if (type === "mermaid") {
        const result = await mermaid.render("graphId", code);
        return result.svg;
      }
      return null;
    });

    // Dart triggers this function and receives the async result through the
    // plugin bridge instead of relying on WebView Promise serialization.
    window.flutterRenderSvg = async (type, code, requestId) => {
      try {
        const svg = await window.renderSvg(type, code);
        window.__flutterSvgResults[requestId] = { status: "ready", svg: svg || "" };
        await window.flutter_inappwebview.callHandler("svgReady", requestId, svg || "");
      } catch (error) {
        window.__flutterSvgResults[requestId] = { status: "error", message: String(error) };
        await window.flutter_inappwebview.callHandler("svgError", requestId, String(error));
      }
    };
  </script>
</body>
</html>
