name: Build Flutter App

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag, for example v1.1.0'
        required: true
        type: string
      publish_release:
        description: 'Publish a GitHub Release after all artifacts build successfully'
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze

      - name: Run tests
        run: flutter test

  build-android:
    name: Build Android APK
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Android APK
        run: flutter build apk --release --split-per-abi

      - name: Build Android App Bundle
        run: flutter build appbundle --release

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 30

      - name: Upload App Bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-appbundle
          path: build/app/outputs/bundle/release/*.aab
          retention-days: 30

  build-windows:
    name: Build Windows executable
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows executable
        run: flutter build windows --release

      - name: Verify build output
        shell: pwsh
        run: |
          Get-ChildItem -Recurse build/windows/ | Select-Object FullName, Length

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: build/windows/x64/runner/Release/
          retention-days: 30

  publish-release:
    name: Publish GitHub Release
    needs: [build-android, build-windows]
    if: >-
      github.event_name == 'workflow_dispatch' &&
      inputs.publish_release == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download APK artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: release-assets/android-apk

      - name: Download App Bundle artifact
        uses: actions/download-artifact@v4
        with:
          name: android-appbundle
          path: release-assets/android-appbundle

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-release
          path: release-assets/windows

      - name: Package Windows release
        run: |
          cd release-assets
          zip -r windows-release.zip windows

      - name: List release assets
        run: find release-assets -maxdepth 2 -type f -print

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          gh release create "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "$RELEASE_TAG" \
            --generate-notes \
            release-assets/android-apk/*.apk \
            release-assets/android-appbundle/*.aab \
            release-assets/windows-release.zip
