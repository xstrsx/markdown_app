name: md_editor
description: A cross-platform Markdown editor built with Flutter
publish_to: 'none'
version: 1.3.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  
  # Markdown rendering
  flutter_markdown: ^0.6.18+3
  markdown: ^7.3.1
  
  # Code highlighting
  flutter_highlighter: ^0.1.1
  highlighter: ^0.1.1
  
  # Math formulas
  flutter_math_fork: ^0.7.2
 
  # ===== 新增：gpt_markdown + flutter_mermaid =====
  gpt_markdown: ^1.1.7
  flutter_mermaid: ^0.1.0
  # =============================================

  # PDF export
  pdf: ^3.11.3
  http: ^1.2.2

  # DOCX export
  docx_creator: ^1.2.7
  flutter_inappwebview: ^6.1.0

  # File operations
  file_picker: ^8.1.6
  path_provider: ^2.1.1
  share_plus: ^7.2.1
  url_launcher: ^6.3.2
  
  # Image picking
  image_picker: ^1.0.4
  
  # Permissions
  permission_handler: ^11.3.1

  # Local storage
  shared_preferences: ^2.2.2
  
  # Window management (desktop)
  window_manager: ^0.3.7
  
  # Utils
  intl: ^0.18.1
  uuid: ^4.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  image_path: "assets/icon/Markdown App.png"

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/fonts/
    - assets/render_assets/
