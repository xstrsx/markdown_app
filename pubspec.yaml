name: md_editor
description: A cross-platform Markdown editor built with Flutter
publish_to: 'none'
version: 1.3.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Markdown parsing and preview
  markdown: ^7.3.1

  gpt_markdown: ^1.1.7
  flutter_mermaid: ^0.1.0

  # PDF export
  pdf: ^3.11.3

  # DOCX export
  docx_creator: ^1.2.7

  # File operations
  file_picker: ^8.1.6
  path_provider: ^2.1.1
  share_plus: ^7.2.1
  url_launcher: ^6.3.2
  
  # Permissions
  permission_handler: ^11.3.1

  # Local storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.2.2
  webdav_client: ^1.2.2
  
  # Window management (desktop)
  window_manager: ^0.3.7
  
  # Utils
  intl: ^0.18.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  image_path: "assets/icon/Markdown App.png"

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/fonts/
